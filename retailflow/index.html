<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RetailFlow ERP — Portfolio Demo</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">RF</div>
        <div>
          <div class="logo-name">RetailFlow</div>
          <div class="logo-sub">ERP System</div>
        </div>
      </div>
      <nav>
        <div class="nav-section-label">Main</div>
        <a class="nav-item active" data-page="dashboard">
          <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="1" width="7" height="7" rx="1.5" fill="currentColor" opacity=".9"/><rect x="10" y="1" width="7" height="7" rx="1.5" fill="currentColor" opacity=".9"/><rect x="1" y="10" width="7" height="7" rx="1.5" fill="currentColor" opacity=".5"/><rect x="10" y="10" width="7" height="7" rx="1.5" fill="currentColor" opacity=".5"/></svg>
          Dashboard
        </a>
        <div class="nav-section-label">Procurement</div>
        <a class="nav-item" data-page="lpo">
          <svg viewBox="0 0 18 18" fill="none"><rect x="3" y="1" width="12" height="16" rx="2" stroke="currentColor" stroke-width="1.4"/><line x1="6" y1="6" x2="12" y2="6" stroke="currentColor" stroke-width="1.1"/><line x1="6" y1="9" x2="12" y2="9" stroke="currentColor" stroke-width="1.1"/><line x1="6" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.1"/></svg>
          Local Purchase Orders
        </a>
        <div class="nav-section-label">Sales</div>
        <a class="nav-item" data-page="orders">
          <svg viewBox="0 0 18 18" fill="none"><circle cx="7" cy="15" r="1.8" fill="currentColor"/><circle cx="13" cy="15" r="1.8" fill="currentColor"/><path d="M1 1h2.5l2.5 9h7l2.5-6H5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          Customer Orders
        </a>
        <a class="nav-item" data-page="invoicing">
          <svg viewBox="0 0 18 18" fill="none"><rect x="3" y="1" width="12" height="16" rx="2" stroke="currentColor" stroke-width="1.4"/><line x1="6" y1="6" x2="12" y2="6" stroke="currentColor" stroke-width="1.1"/><line x1="6" y1="9" x2="12" y2="9" stroke="currentColor" stroke-width="1.1"/><line x1="9" y1="13" x2="12" y2="13" stroke="currentColor" stroke-width="1.1"/><line x1="6" y1="13" x2="7.5" y2="13" stroke="currentColor" stroke-width="1.1"/></svg>
          Invoicing
        </a>
        <div class="nav-section-label">Inventory</div>
        <a class="nav-item" data-page="transfers">
          <svg viewBox="0 0 18 18" fill="none"><path d="M4 7l4-4 4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M8 3v8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M14 11l-4 4-4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M10 15V7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          Interbranch Transfers
        </a>
        <a class="nav-item" data-page="stock">
          <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="10" width="16" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="4" y="6" width="10" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="7" y="2" width="4" height="5" rx="1" stroke="currentColor" stroke-width="1.1"/></svg>
          Stock Levels
        </a>
        <div class="nav-section-label">Finance</div>
        <a class="nav-item" data-page="payments">
          <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="5" width="16" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/><line x1="1" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.8"/><circle cx="5" cy="12.5" r="1.2" fill="currentColor" opacity=".6"/></svg>
          Bank Payments
        </a>
        <a class="nav-item" data-page="reports">
          <svg viewBox="0 0 18 18" fill="none"><polyline points="2,14 6,8 10,11 14,4 16,6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Reports & Analytics
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar">JM</div>
          <div><div class="user-name">Jane Mwangi</div><div class="user-role">Branch Manager</div></div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <!-- Each page is loaded via JS -->
      <div id="page-root"></div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/lpo.js"></script>
  <script src="js/pages/orders.js"></script>
  <script src="js/pages/invoicing.js"></script>
  <script src="js/pages/transfers.js"></script>
  <script src="js/pages/stock.js"></script>
  <script src="js/pages/payments.js"></script>
  <script src="js/pages/reports.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
